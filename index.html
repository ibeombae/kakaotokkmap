<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>종교 시설 지도 서비스</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 전체 화면 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 360px;
            background-color: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        /* 제목 */
        .title {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }

        /* 탭 메뉴 */
        .tab-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .tab-button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background-color: #f1f1f1;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-button:hover {
            background-color: #ddd;
        }

        .active-tab {
            background-color: #fee500;
        }

        /* 검색 결과 */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 15px;
        }

        .result-item {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .result-item:hover {
            background-color: #f5f5f5;
        }

        .place-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .place-address {
            font-size: 13px;
            color: #666;
        }

        /* 지도 영역 */
        .map-area {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 로드뷰 */
        #roadview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 250px;
            border: 3px solid white;
            border-radius: 12px;
            overflow: hidden;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- 왼쪽 영역 -->
        <div class="sidebar">

            <div class="title">
                종교 시설 지도
            </div>

            <!-- 탭 메뉴 -->
            <div class="tab-container">

                <button class="tab-button active-tab" onclick="searchReligion('절', this)">
                    절
                </button>

                <button class="tab-button" onclick="searchReligion('교회', this)">
                    교회
                </button>

                <button class="tab-button" onclick="searchReligion('성당', this)">
                    성당
                </button>

                <button class="tab-button" onclick="searchReligion('모스크', this)">
                    모스크
                </button>

                <button class="tab-button" onclick="searchReligion('원불교', this)">
                    원불교
                </button>

            </div>

            <!-- 검색 결과 -->
            <ul class="result-list" id="resultList"></ul>

        </div>

        <!-- 지도 -->
        <div class="map-area">

            <div id="map"></div>

            <!-- 로드뷰 -->
            <div id="roadview"></div>

        </div>

    </div>

    <!-- 카카오맵 SDK -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=70a1bb5c7d8e1e60565bfc6a59b8266f&libraries=services&autoload=false"></script>

    <script>

        // 지도 객체
        let map;

        // 장소 검색 객체
        let placesService;

        // 마커 배열
        let markers = [];

        // 로드뷰 객체
        let roadview;

        // 로드뷰 클라이언트
        let roadviewClient;

        // 현재 위치
        let currentPosition;

        // 지도 로딩 완료 후 실행
        kakao.maps.load(function () {

            // 위치 권한 요청
            navigator.geolocation.getCurrentPosition(

                function (position) {

                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;

                    createMap(latitude, longitude);

                },

                function () {

                    // 실패 시 서울시청
                    createMap(37.5665, 126.9780);

                }

            );

        });

        // 지도 생성 함수
        function createMap(latitude, longitude) {

            currentPosition = new kakao.maps.LatLng(latitude, longitude);

            // 지도 생성
            map = new kakao.maps.Map(
                document.getElementById("map"),
                {
                    center: currentPosition,
                    level: 5
                }
            );

            // 교통 정보 표시
            map.addOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);

            // 현재 위치 마커
            const currentMarker = new kakao.maps.Marker({
                map: map,
                position: currentPosition
            });

            // 현재 위치 인포윈도우
            const infoWindow = new kakao.maps.InfoWindow({
                content: "<div style='padding:5px;'>현재 위치</div>"
            });

            infoWindow.open(map, currentMarker);

            // 장소 검색 서비스 생성
            placesService = new kakao.maps.services.Places();

            // 로드뷰 생성
            roadview = new kakao.maps.Roadview(
                document.getElementById("roadview")
            );

            roadviewClient = new kakao.maps.RoadviewClient();

            // 기본 검색 실행
            searchReligion("절", document.querySelector(".tab-button"));

        }

        // 종교 시설 검색 함수
        function searchReligion(keyword, buttonElement) {

            // 탭 스타일 초기화
            document.querySelectorAll(".tab-button")
                .forEach(function (button) {
                    button.classList.remove("active-tab");
                });

            buttonElement.classList.add("active-tab");

            // 기존 마커 제거
            removeMarkers();

            // 검색 실행
            placesService.keywordSearch(
                keyword,
                placesSearchCallback
            );

        }

        // 검색 결과 처리
        function placesSearchCallback(data, status) {

            if (status === kakao.maps.services.Status.OK) {

                displayPlaces(data);

            } else {

                alert("검색 결과가 없습니다.");

            }

        }

        // 장소 표시 함수
        function displayPlaces(places) {

            const resultList = document.getElementById("resultList");

            resultList.innerHTML = "";

            const bounds = new kakao.maps.LatLngBounds();

            places.forEach(function (place) {

                const position = new kakao.maps.LatLng(place.y, place.x);

                // 마커 이미지 설정
                const markerImage = createMarkerImage(place.place_name);

                // 마커 생성
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: position,
                    image: markerImage
                });

                markers.push(marker);

                bounds.extend(position);

                // 리스트 생성
                const item = document.createElement("li");

                item.className = "result-item";

                item.innerHTML = `
                    <div class="place-name">
                        ${place.place_name}
                    </div>

                    <div class="place-address">
                        ${place.address_name || "주소 정보 없음"}
                    </div>
                `;

                // 클릭 이벤트
                item.addEventListener("click", function () {

                    map.setCenter(position);
                    map.setLevel(3);

                    showRoadview(position);

                });

                // 마커 클릭 이벤트
                kakao.maps.event.addListener(marker, "click", function () {

                    showRoadview(position);

                });

                resultList.appendChild(item);

            });

            map.setBounds(bounds);

        }

        // 마커 이미지 생성 함수
        function createMarkerImage(placeName) {

            let imageUrl = "";

            // 종교별 마커 이미지
            if (placeName.includes("절")) {

                imageUrl =
                    "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png";

            } else if (placeName.includes("교회")) {

                imageUrl =
                    "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png";

            } else if (placeName.includes("성당")) {

                imageUrl =
                    "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png";

            } else if (placeName.includes("모스크")) {

                imageUrl =
                    "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_green.png";

            } else {

                imageUrl =
                    "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_yellow.png";

            }

            const imageSize = new kakao.maps.Size(32, 35);

            return new kakao.maps.MarkerImage(
                imageUrl,
                imageSize
            );

        }

        // 로드뷰 표시 함수
        function showRoadview(position) {

            roadviewClient.getNearestPanoId(
                position,
                50,
                function (panoId) {

                    if (panoId) {

                        roadview.setPanoId(
                            panoId,
                            position
                        );

                    }

                }
            );

        }

        // 마커 제거 함수
        function removeMarkers() {

            markers.forEach(function (marker) {

                marker.setMap(null);

            });

            markers = [];

        }

    </script>

</body>
</html>
