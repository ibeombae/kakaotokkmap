<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 영화 특별관 찾기</title>

    <style>
        /* 기본 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 전체 레이아웃 */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 사이드바 */
        #sidebar {
            width: 360px;
            height: 100%;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
        }

        /* 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 제목 */
        .title {
            margin-bottom: 20px;
        }

        /* 탭 버튼 */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #e9ecef;
            font-weight: bold;
            transition: 0.2s;
        }

        .tab-button.active {
            background-color: #fee500;
        }

        /* 리스트 */
        #places-list {
            list-style: none;
        }

        #places-list li {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        #places-list li:hover {
            background-color: #f1f3f5;
        }

        #places-list h4 {
            margin-bottom: 6px;
            color: #222;
        }

        #places-list p {
            font-size: 13px;
            color: #666;
        }

        .badge {
            display: inline-block;
            margin-top: 5px;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            background-color: #222;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 왼쪽 사이드바 -->
    <div id="sidebar">

        <div class="title">
            <h2>🎬 전국 영화 특별관 찾기</h2>
        </div>

        <!-- 탭 -->
        <div class="tab-container">
            <button class="tab-button active" onclick="searchIMAX()">
                🍿 IMAX
            </button>

            <button class="tab-button" onclick="searchDolby()">
                🌿 Dolby Cinema
            </button>
        </div>

        <!-- 검색 결과 -->
        <ul id="places-list"></ul>

    </div>

    <!-- 지도 -->
    <div id="map"></div>

</div>

<!-- 카카오맵 -->
<script type="text/javascript"
src="//dapi.kakao.com/v2/maps/sdk.js?appkey=70a1bb5c7d8e1e60565bfc6a59b8266f&libraries=services"></script>

<script>

    let map;
    let placeService;

    let userLatitude;
    let userLongitude;

    let markers = [];
    let currentMarker = null;

    /* 현재 활성 탭 */
    let currentCategory = "IMAX";

    /* IMAX 영화관 키워드 */
    const imaxKeywords = [
        "CGV IMAX",
        "아이맥스"
    ];

    /* Dolby Cinema 키워드 */
    const dolbyKeywords = [
        "Dolby Cinema",
        "돌비시네마"
    ];

    /* 지도 초기화 */
    function initMap(latitude, longitude) {

        const mapContainer = document.getElementById('map');

        const mapOption = {
            center: new kakao.maps.LatLng(latitude, longitude),
            level: 6
        };

        map = new kakao.maps.Map(mapContainer, mapOption);

        placeService = new kakao.maps.services.Places();

        displayCurrentLocation(latitude, longitude);

        searchIMAX();
    }

    /* 현재 위치 표시 */
    function displayCurrentLocation(latitude, longitude) {

        const currentPosition = new kakao.maps.LatLng(latitude, longitude);

        const currentImage = new kakao.maps.MarkerImage(
            "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png",
            new kakao.maps.Size(24, 35)
        );

        currentMarker = new kakao.maps.Marker({
            map: map,
            position: currentPosition,
            image: currentImage
        });

        const infoWindow = new kakao.maps.InfoWindow({
            content: '<div style="padding:5px;">📍 현재 위치</div>'
        });

        infoWindow.open(map, currentMarker);
    }

    /* 사용자 위치 가져오기 */
    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(function(position) {

            userLatitude = position.coords.latitude;
            userLongitude = position.coords.longitude;

            initMap(userLatitude, userLongitude);

        }, function(error) {

            console.error(error);

            userLatitude = 37.566826;
            userLongitude = 126.9786567;

            initMap(userLatitude, userLongitude);

        });

    } else {

        userLatitude = 37.566826;
        userLongitude = 126.9786567;

        initMap(userLatitude, userLongitude);
    }

    /* 탭 활성화 */
    function activateTab(index) {

        const buttons = document.querySelectorAll('.tab-button');

        buttons.forEach(button => {
            button.classList.remove('active');
        });

        buttons[index].classList.add('active');
    }

    /* IMAX 검색 */
    function searchIMAX() {

        currentCategory = "IMAX";

        activateTab(0);

        searchSpecialCinema(imaxKeywords, "IMAX");
    }

    /* Dolby 검색 */
    function searchDolby() {

        currentCategory = "Dolby";

        activateTab(1);

        searchSpecialCinema(dolbyKeywords, "Dolby");
    }

    /* 특별관 검색 */
    function searchSpecialCinema(keywordArray, type) {

        removeMarkers();

        document.getElementById('places-list').innerHTML = '';

        const bounds = new kakao.maps.LatLngBounds();

        keywordArray.forEach(keyword => {

            /* CT1 카테고리(문화시설) 검색 */
            placeService.keywordSearch(
                keyword,
                function(data, status) {

                    if (status === kakao.maps.services.Status.OK) {

                        displayPlaces(data, type, bounds);

                    }

                },
                {
                    category_group_code: 'CT1',
                    location: new kakao.maps.LatLng(userLatitude, userLongitude),
                    radius: 50000
                }
            );

        });
    }

    /* 검색 결과 표시 */
    function displayPlaces(places, type, bounds) {

        const listElement = document.getElementById('places-list');

        places.forEach(place => {

            const position = new kakao.maps.LatLng(place.y, place.x);

            bounds.extend(position);

            createMarker(position, place.place_name, type);

            /* 리스트 생성 */
            const item = document.createElement('li');

            item.innerHTML = `
                <h4>${place.place_name}</h4>
                <p>${place.address_name}</p>
                <span class="badge">${type}</span>
            `;

            /* 리스트 클릭 시 이동 */
            item.onclick = function() {

                map.panTo(position);

            };

            listElement.appendChild(item);

        });

        map.setBounds(bounds);
    }

    /* 마커 생성 */
    function createMarker(position, title, type) {

        let imageUrl;

        /* 카테고리별 다른 마커 */
        if (type === "IMAX") {

            imageUrl = "https://cdn-icons-png.flaticon.com/512/1046/1046784.png";

        } else {

            imageUrl = "https://cdn-icons-png.flaticon.com/512/427/427735.png";

        }

        const markerImage = new kakao.maps.MarkerImage(
            imageUrl,
            new kakao.maps.Size(45, 45)
        );

        const marker = new kakao.maps.Marker({
            map: map,
            position: position,
            title: title,
            image: markerImage
        });

        markers.push(marker);

        /* 인포윈도우 */
        const infoWindow = new kakao.maps.InfoWindow({
            content: `
                <div style="padding:8px; font-size:13px;">
                    🎬 ${title}<br>
                    특별관: ${type}
                </div>
            `
        });

        kakao.maps.event.addListener(marker, 'click', function() {
            infoWindow.open(map, marker);
        });
    }

    /* 기존 마커 제거 */
    function removeMarkers() {

        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }

        markers = [];
    }

</script>

</body>
</html>
